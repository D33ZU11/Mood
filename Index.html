<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Visual Board</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Active Routine Board -->
        <section class="board-section">
            <h1>Today's Sequence</h1>
            <div id="routineDisplay" class="grid"></div>
            
            <button id="shareBtn" class="btn-primary">
                📲 Share to WhatsApp
            </button>
            <p id="clearRoutine" class="clear-link">Clear Sequence</p>
        </section>

        <!-- Category Folders -->
        <div id="folderNav" class="folder-row"></div>

        <!-- Card Library -->
        <section class="library-section">
            <div class="library-header">
                <h2 id="categoryTitle"></h2>
                <button id="addNewBtn" class="btn-secondary">+ New Card</button>
            </div>
            <div id="cardLibrary" class="library-grid"></div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
